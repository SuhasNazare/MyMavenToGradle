plugins {
    id 'java'
    id 'application'
}

group = 'com.example1'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'junit:junit:3.8.1'
}

application {
    mainClass = 'com.example1.App'
}

jar {
    manifest {
        attributes 'Main-Class': 'com.example1.App'
    }
}
